services:
  toolbridge:
    build: .
    restart: always
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-http://127.0.0.1:3000}
      - UPSTREAM_AUTH_HEADER=${UPSTREAM_AUTH_HEADER:-}
      - UPSTREAM_TIMEOUT_SECONDS=${UPSTREAM_TIMEOUT_SECONDS:-240}
      - MODEL_MAP_JSON=${MODEL_MAP_JSON:-{}}
      - NATIVE_TOOL_MODELS_JSON=${NATIVE_TOOL_MODELS_JSON:-[]}
      - PUBLIC_MODEL_IDS_JSON=${PUBLIC_MODEL_IDS_JSON:-[]}
      - ALLOW_UNMAPPED_MODEL_PASSTHROUGH=${ALLOW_UNMAPPED_MODEL_PASSTHROUGH:-true}
      - FC_ERROR_RETRY=${FC_ERROR_RETRY:-true}
      - FC_ERROR_RETRY_MAX_ATTEMPTS=${FC_ERROR_RETRY_MAX_ATTEMPTS:-3}
    ports:
      - "${PORT:-8080}:8080"
